<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #242424;
      --bg-hover: #2a2a2a;
      --border-color: #333333;
      --text-primary: #ffffff;
      --text-secondary: #a1a1a1;
      --text-muted: #666666;
      --accent: #ffffff;
      --accent-blue: #3b82f6;
      --operator-bg: #2a2a2a;
      --number-bg: #1a1a1a;
      --function-bg: #1f1f1f;
      --equals-bg: #3b82f6;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      color: var(--text-primary);
    }
    
    .app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }
    
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--bg-primary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 16px 0;
      flex-shrink: 0;
    }
    
    .sidebar-header {
      padding: 0 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }
    
    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 8px;
    }
    
    .nav-item {
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    .nav-item.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .sidebar-footer {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }
    
    /* Main Content - Calculator Area */
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: var(--bg-primary);
    }
    
    .calculator-wrapper {
      display: flex;
      gap: 1px;
      background: var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .calculator {
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      min-width: 800px;
    }
    
    /* Calculator Display */
    .calculator-display {
      background: var(--bg-primary);
      padding: 32px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .expression {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      min-height: 24px;
      font-family: 'Courier New', monospace;
    }
    
    .result {
      font-size: 48px;
      color: var(--text-primary);
      font-weight: 300;
      text-align: right;
      font-family: 'Courier New', monospace;
    }
    
    /* Calculator Keyboard */
    .calculator-keyboard {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }
    
    .calc-btn {
      padding: 20px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--number-bg);
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
    }
    
    .calc-btn:hover {
      background: var(--bg-hover);
      border-color: var(--text-muted);
    }
    
    .calc-btn:active {
      transform: scale(0.98);
    }
    
    .calc-btn.operator {
      background: var(--operator-bg);
      color: var(--accent-blue);
      font-weight: 600;
    }
    
    .calc-btn.function {
      background: var(--function-bg);
      font-size: 14px;
      font-weight: 500;
    }
    
    .calc-btn.equals {
      background: var(--equals-bg);
      color: white;
      font-weight: 600;
      border: none;
    }
    
    .calc-btn.equals:hover {
      background: #2563eb;
    }
    
    .calc-btn.clear {
      background: #dc2626;
      color: white;
      border: none;
    }
    
    .calc-btn.clear:hover {
      background: #b91c1c;
    }
    
    .calc-btn.span-2 {
      grid-column: span 2;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    function Calculator() {
      const [expression, setExpression] = useState('');
      const [result, setResult] = useState('0');
      const [history, setHistory] = useState([]);
      
      const buttons = [
        // Row 1 - Advanced functions
        { label: 'sin', type: 'function', value: 'sin(' },
        { label: 'cos', type: 'function', value: 'cos(' },
        { label: 'tan', type: 'function', value: 'tan(' },
        { label: 'ln', type: 'function', value: 'ln(' },
        { label: 'log', type: 'function', value: 'log(' },
        { label: 'C', type: 'clear', value: 'clear' },
        
        // Row 2 - More functions and numbers
        { label: 'asin', type: 'function', value: 'asin(' },
        { label: 'acos', type: 'function', value: 'acos(' },
        { label: 'atan', type: 'function', value: 'atan(' },
        { label: 'π', type: 'number', value: 'π' },
        { label: 'e', type: 'number', value: 'e' },
        { label: '⌫', type: 'operator', value: 'backspace' },
        
        // Row 3 - Powers and roots
        { label: 'x²', type: 'function', value: '^2' },
        { label: 'xʸ', type: 'operator', value: '^' },
        { label: '√', type: 'function', value: 'sqrt(' },
        { label: '7', type: 'number', value: '7' },
        { label: '8', type: 'number', value: '8' },
        { label: '9', type: 'number', value: '9' },
        
        // Row 4 - More operators
        { label: '(', type: 'operator', value: '(' },
        { label: ')', type: 'operator', value: ')' },
        { label: '%', type: 'operator', value: '%' },
        { label: '4', type: 'number', value: '4' },
        { label: '5', type: 'number', value: '5' },
        { label: '6', type: 'number', value: '6' },
        
        // Row 5 - Basic operators
        { label: '1/x', type: 'function', value: '1/' },
        { label: '|x|', type: 'function', value: 'abs(' },
        { label: '÷', type: 'operator', value: '/' },
        { label: '1', type: 'number', value: '1' },
        { label: '2', type: 'number', value: '2' },
        { label: '3', type: 'number', value: '3' },
        
        // Row 6 - Final row
        { label: '0', type: 'number', value: '0', span: 2 },
        { label: '.', type: 'number', value: '.' },
        { label: '×', type: 'operator', value: '*' },
        { label: '-', type: 'operator', value: '-' },
        { label: '+', type: 'operator', value: '+' },
        
        // Row 7 - Equals
        { label: '=', type: 'equals', value: 'equals', span: 6 }
      ];
      
      const evaluateExpression = (expr) => {
        try {
          // Replace mathematical functions and constants
          let evalExpr = expr
            .replace(/π/g, 'Math.PI')
            .replace(/e/g, 'Math.E')
            .replace(/sin\(/g, 'Math.sin(')
            .replace(/cos\(/g, 'Math.cos(')
            .replace(/tan\(/g, 'Math.tan(')
            .replace(/asin\(/g, 'Math.asin(')
            .replace(/acos\(/g, 'Math.acos(')
            .replace(/atan\(/g, 'Math.atan(')
            .replace(/ln\(/g, 'Math.log(')
            .replace(/log\(/g, 'Math.log10(')
            .replace(/sqrt\(/g, 'Math.sqrt(')
            .replace(/abs\(/g, 'Math.abs(')
            .replace(/\^/g, '**');
          
          // Evaluate safely
          const result = Function('"use strict";return (' + evalExpr + ')')();
          return Number.isFinite(result) ? result : 'Error';
        } catch (e) {
          return 'Error';
        }
      };
      
      const handleButton = (value) => {
        if (value === 'clear') {
          setExpression('');
          setResult('0');
        } else if (value === 'backspace') {
          setExpression(prev => prev.slice(0, -1));
        } else if (value === 'equals') {
          const evalResult = evaluateExpression(expression);
          setResult(evalResult.toString());
          setHistory([...history, { expression, result: evalResult }]);
          setExpression(evalResult.toString());
        } else {
          setExpression(prev => prev + value);
        }
      };
      
      // Keyboard support
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key >= '0' && e.key <= '9') handleButton(e.key);
          else if (e.key === '.') handleButton('.');
          else if (e.key === '+') handleButton('+');
          else if (e.key === '-') handleButton('-');
          else if (e.key === '*') handleButton('*');
          else if (e.key === '/') handleButton('/');
          else if (e.key === 'Enter' || e.key === '=') handleButton('equals');
          else if (e.key === 'Escape') handleButton('clear');
          else if (e.key === 'Backspace') handleButton('backspace');
          else if (e.key === '(' || e.key === ')') handleButton(e.key);
        };
        
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [expression]);
      
      return (
        <div className="calculator">
          <div className="calculator-display">
            <div className="expression">{expression || ' '}</div>
            <div className="result">{result}</div>
          </div>
          
          <div className="calculator-keyboard">
            {buttons.map((btn, index) => (
              <button
                key={index}
                className={`calc-btn ${btn.type} ${btn.span ? `span-${btn.span}` : ''}`}
                onClick={() => handleButton(btn.value)}
              >
                {btn.label}
              </button>
            ))}
          </div>
        </div>
      );
    }
    
    function App() {
      return (
        <div className="app-container">
          <aside className="sidebar">
            <div className="sidebar-header">
              <div className="logo">P</div>
            </div>
            
            <nav className="sidebar-nav">
              <div className="nav-item">📁 Files</div>
              <div className="nav-item">💬 Chats</div>
              <div className="nav-item active">🔢 Calculator</div>
            </nav>
            
            <div className="sidebar-footer">
              <div className="user-avatar">B</div>
              <span>benjaminas.petronis@gmail.com</span>
            </div>
          </aside>
          
          <main className="main-content">
            <Calculator />
          </main>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
